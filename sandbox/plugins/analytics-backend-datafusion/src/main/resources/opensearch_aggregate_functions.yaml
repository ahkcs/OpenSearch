%YAML 1.2
---
urn: extension:org.opensearch:aggregate_functions
aggregate_functions:
  - name: approx_distinct
    description: >-
      Approximate distinct count using HyperLogLog. Maps to DataFusion's
      approx_distinct aggregate function via its Substrait consumer.
    impls:
      - args:
          - value: any
            name: "input"
        return: i64
  # Distribution-specific stddev / variance variants.
  #
  # Substrait core declares only `std_dev` and `variance` (singular) with a
  # `distribution` option arg. DataFusion's substrait consumer recognizes the
  # split per-distribution names directly, and PPL emits separate Calcite
  # SqlAggFunctions for STDDEV_POP / STDDEV_SAMP / VAR_POP / VAR_SAMP — so it's
  # simpler to declare the four split names here and let isthmus pass them
  # through verbatim than to teach our converter how to fold the distribution
  # into a substrait-conformant `std_dev` / `variance` call.
  #
  # Argument list mirrors substrait core's `std_dev`: a single numeric input.
  # Return type pinned to fp64 (same as DataFusion's runtime promotion of
  # integer inputs to fp64 for variance / stddev).
  - name: "stddev_pop"
    description: "Population standard deviation."
    impls:
      - args: [{ value: fp64, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: fp32, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: i64, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: i32, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
  - name: "stddev_samp"
    description: "Sample standard deviation."
    impls:
      - args: [{ value: fp64, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: fp32, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: i64, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: i32, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
  - name: "var_pop"
    description: "Population variance."
    impls:
      - args: [{ value: fp64, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: fp32, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: i64, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: i32, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
  - name: "var_samp"
    description: "Sample variance."
    impls:
      - args: [{ value: fp64, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: fp32, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: i64, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: i32, name: x }]
        nullability: DECLARED_OUTPUT
        return: fp64?
  # TDigest-based approximate continuous percentile. Lowering target for PPL's
  # `percentile(field, N)` / `percentile_approx(field, N [, compression])`.
  # PlannerImpl rewrites the call's argList to `[field, percent_fraction]` and drops the
  # SYMBOL-typed sqlflag column from the upstream Project; the percent column is rescaled
  # to fp64 in `[0,1]`. SubstraitPlanRewriter then lifts the percent column-ref to an
  # inline Literal so DataFusion's `approx_percentile_cont` (which requires a literal
  # percent) is satisfied — `WrappedAggregateCall.getOperands` in isthmus 0.89.1 silently
  # drops `rexList`, so we can't pass the literal that way.
  # Only one impl per type combination — substrait keys impls by `(name, args_signature)`
  # without nullability, so declaring fp64 and fp64? variants for the same arg position
  # collides and trips "Duplicate key". `nullability: DECLARED_OUTPUT` is what unifies the
  # nullability handling — actual nullable inputs are promoted to match the spec at lookup.
  - name: "approx_percentile_cont"
    description: "TDigest-based approximate continuous percentile."
    impls:
      - args: [{ value: fp64, name: x }, { value: fp64, name: percentile }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: fp32, name: x }, { value: fp64, name: percentile }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: i64, name: x }, { value: fp64, name: percentile }]
        nullability: DECLARED_OUTPUT
        return: fp64?
      - args: [{ value: i32, name: x }, { value: fp64, name: percentile }]
        nullability: DECLARED_OUTPUT
        return: fp64?
